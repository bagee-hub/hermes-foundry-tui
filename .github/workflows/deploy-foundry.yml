name: Deploy to Azure AI Foundry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'agent/**'
      - 'third_party/hermes/**'
      - 'infra/**'
      - '.github/workflows/deploy-foundry.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install azd
        run: |
          # Try multiple installation methods
          if command -v azd &> /dev/null; then
            echo "azd already installed"
            azd version
            exit 0
          fi
          
          # Method 1: Try apt package (Ubuntu)
          if command -v apt-get &> /dev/null; then
            echo "Trying apt installation..."
            curl -fsSL https://aka.ms/install-azd.sh | bash -s -- --skip-verify || true
          fi
          
          # Method 2: Try direct GitHub release
          if ! command -v azd &> /dev/null; then
            echo "Trying GitHub release..."
            ARCH=$(dpkg --print-architecture)
            VERSION=$(curl -s https://api.github.com/repos/Azure/azure-dev/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | sed 's/azure-dev-cli_//')
            wget -q "https://github.com/Azure/azure-dev/releases/download/azure-dev-cli_${VERSION}/azd-linux-${ARCH}.deb" -O /tmp/azd.deb
            sudo dpkg -i /tmp/azd.deb || sudo apt-get install -f -y
          fi
          
          # Verify installation
          azd version
      
      - name: Log in to Azure (az CLI)
        run: |
          az login --service-principal \
            --username ${{ secrets.AZURE_CLIENT_ID }} \
            --password ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Log in to Azure (azd CLI)
        run: |
          azd auth login --client-id ${{ secrets.AZURE_CLIENT_ID }} \
            --client-secret ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant-id ${{ secrets.AZURE_TENANT_ID }}
      
      - name: Install azd AI agents extension
        run: |
          azd extension install azure.ai.agents --version latest
          azd extension list
      
      - name: Restore azd environment
        run: |
          azd env new ${{ secrets.AZURE_ENV_NAME }} --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} --location ${{ secrets.AZURE_LOCATION }} || true
          azd env select ${{ secrets.AZURE_ENV_NAME }}
          
          # Set required environment variables
          azd env set AZURE_LOCATION ${{ secrets.AZURE_LOCATION }}
          
          # Try to refresh from Azure (this will populate variables from existing resources)
          echo "Refreshing environment from Azure..."
          if azd env refresh; then
            echo "✓ Environment refreshed from Azure"
          else
            echo "⚠ Could not refresh from Azure, setting variables manually"
            
            # Query Azure for resource information
            RG_NAME=$(az group list --query "[?location=='${{ secrets.AZURE_LOCATION }}'].name | [0]" -o tsv)
            AI_ACCOUNT=$(az cognitiveservices account list -g "$RG_NAME" --query "[0].name" -o tsv 2>/dev/null || echo "")
            
            if [ -n "$AI_ACCOUNT" ]; then
              AI_ENDPOINT=$(az cognitiveservices account show -n "$AI_ACCOUNT" -g "$RG_NAME" --query "properties.endpoint" -o tsv)
              OPENAI_ENDPOINT="${AI_ENDPOINT%/}"
              
              azd env set AZURE_RESOURCE_GROUP "$RG_NAME"
              azd env set AZURE_AI_ACCOUNT_NAME "$AI_ACCOUNT"
              azd env set AZURE_FOUNDRY_BASE_URL "$OPENAI_ENDPOINT"
            fi
          fi
          
          # Ensure critical Foundry variables are set
          azd env set AZURE_FOUNDRY_MODEL_DEPLOYMENT_NAME "gpt-4.1-mini"
          azd env set AZURE_FOUNDRY_MODEL_NAME "gpt-4.1-mini"
          azd env set AZURE_FOUNDRY_MODEL_API_MODE "chat_completions"
          azd env set AZURE_FOUNDRY_AUTH_MODE "entra_id"
          
          # Verify BASE_URL is set
          BASE_URL=$(azd env get-value AZURE_FOUNDRY_BASE_URL || echo "")
          if [ -z "$BASE_URL" ]; then
            echo "ERROR: AZURE_FOUNDRY_BASE_URL is not set"
            echo "Available environment variables:"
            azd env get-values
            exit 1
          fi
          
          # Show environment for debugging
          echo "✓ Environment variables configured:"
          azd env get-values | grep -E "AZURE_FOUNDRY|AZURE_AI|AZURE_RESOURCE_GROUP" || echo "No Foundry variables found"
      
      - name: Deploy to Azure
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ secrets.AZURE_ENV_NAME }}
