name: Deploy to Azure AI Foundry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'agent/**'
      - 'third_party/hermes/**'
      - 'infra/**'
      - '.github/workflows/deploy-foundry.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install azd
        run: |
          # Try multiple installation methods
          if command -v azd &> /dev/null; then
            echo "azd already installed"
            azd version
            exit 0
          fi
          
          # Method 1: Try apt package (Ubuntu)
          if command -v apt-get &> /dev/null; then
            echo "Trying apt installation..."
            curl -fsSL https://aka.ms/install-azd.sh | bash -s -- --skip-verify || true
          fi
          
          # Method 2: Try direct GitHub release
          if ! command -v azd &> /dev/null; then
            echo "Trying GitHub release..."
            ARCH=$(dpkg --print-architecture)
            VERSION=$(curl -s https://api.github.com/repos/Azure/azure-dev/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | sed 's/azure-dev-cli_//')
            wget -q "https://github.com/Azure/azure-dev/releases/download/azure-dev-cli_${VERSION}/azd-linux-${ARCH}.deb" -O /tmp/azd.deb
            sudo dpkg -i /tmp/azd.deb || sudo apt-get install -f -y
          fi
          
          # Verify installation
          azd version
      
      - name: Log in to Azure (az CLI)
        run: |
          az login --service-principal \
            --username ${{ secrets.AZURE_CLIENT_ID }} \
            --password ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Log in to Azure (azd CLI)
        run: |
          azd auth login --client-id ${{ secrets.AZURE_CLIENT_ID }} \
            --client-secret ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant-id ${{ secrets.AZURE_TENANT_ID }}
      
      - name: Install azd AI agents extension
        run: |
          azd extension install azure.ai.agents --version latest
          azd extension list
      
      - name: Restore azd environment
        run: |
          azd env new ${{ secrets.AZURE_ENV_NAME }} --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} --location ${{ secrets.AZURE_LOCATION }} || true
          azd env select ${{ secrets.AZURE_ENV_NAME }}
          
          # Set required environment variables
          azd env set AZURE_LOCATION ${{ secrets.AZURE_LOCATION }}
          
          # Query Azure for resource information (more reliable than azd env refresh in CI)
          echo "Querying Azure resources..."
          RG_NAME=$(az group list --query "[?location=='${{ secrets.AZURE_LOCATION }}'] | [0].name" -o tsv)
          echo "Resource Group: $RG_NAME"
          
          if [ -z "$RG_NAME" ]; then
            echo "ERROR: No resource group found in location ${{ secrets.AZURE_LOCATION }}"
            exit 1
          fi
          
          # Get AI account information
          AI_ACCOUNT=$(az cognitiveservices account list -g "$RG_NAME" --query "[?kind=='AIServices' || kind=='OpenAI'] | [0].name" -o tsv)
          echo "AI Account: $AI_ACCOUNT"
          
          if [ -z "$AI_ACCOUNT" ]; then
            echo "ERROR: No AI account found in resource group $RG_NAME"
            exit 1
          fi
          
          # Get endpoints and account details
          AI_ENDPOINT=$(az cognitiveservices account show -n "$AI_ACCOUNT" -g "$RG_NAME" --query "properties.endpoint" -o tsv)
          AI_ACCOUNT_ID=$(az cognitiveservices account show -n "$AI_ACCOUNT" -g "$RG_NAME" --query "id" -o tsv)
          echo "AI Endpoint: $AI_ENDPOINT"
          echo "AI Account ID: $AI_ACCOUNT_ID"
          
          # Get AI Foundry project - try multiple methods
          echo "Searching for AI Foundry project..."
          
          # Method 1: List all resources and filter for projects
          AI_PROJECT=$(az resource list -g "$RG_NAME" --query "[?type=='Microsoft.CognitiveServices/accounts/projects'].name | [0]" -o tsv 2>/dev/null || echo "")
          
          # Method 2: If not found, try direct REST API call
          if [ -z "$AI_PROJECT" ]; then
            AI_PROJECT=$(az rest --method get --url "${AI_ACCOUNT_ID}/projects?api-version=2024-04-01-preview" --query "value[0].name" -o tsv 2>/dev/null || echo "")
          fi
          
          # Method 3: Use known project name from provisioning
          if [ -z "$AI_PROJECT" ]; then
            echo "Could not query project, using default name 'hermes-build'"
            AI_PROJECT="hermes-build"
          fi
          
          if [ -n "$AI_PROJECT" ]; then
            AI_PROJECT_ID="${AI_ACCOUNT_ID}/projects/${AI_PROJECT}"
            AI_PROJECT_ENDPOINT="${AI_ENDPOINT}api/projects/${AI_PROJECT}"
            echo "✓ AI Project: $AI_PROJECT"
            echo "✓ AI Project ID: $AI_PROJECT_ID"
            echo "✓ AI Project Endpoint: $AI_PROJECT_ENDPOINT"
          else
            echo "ERROR: Could not determine AI Foundry project name"
            exit 1
          fi
          
          # Construct OpenAI endpoint (remove trailing slash)
          OPENAI_ENDPOINT="${AI_ENDPOINT%/}"
          
          # Set all required variables
          azd env set AZURE_RESOURCE_GROUP "$RG_NAME"
          azd env set AZURE_AI_ACCOUNT_NAME "$AI_ACCOUNT"
          azd env set AZURE_AI_ACCOUNT_ID "$AI_ACCOUNT_ID"
          azd env set AZURE_FOUNDRY_BASE_URL "$OPENAI_ENDPOINT"
          
          if [ -n "$AI_PROJECT_ID" ]; then
            azd env set AZURE_AI_PROJECT_ID "$AI_PROJECT_ID"
            azd env set AZURE_AI_PROJECT_NAME "$AI_PROJECT"
            azd env set AZURE_AI_PROJECT_ENDPOINT "$AI_PROJECT_ENDPOINT"
            azd env set AZURE_AI_FOUNDRY_PROJECT_ID "$AI_PROJECT_ID"
            azd env set FOUNDRY_PROJECT_ID "$AI_PROJECT_ID"
            azd env set FOUNDRY_PROJECT_ENDPOINT "$AI_PROJECT_ENDPOINT"
            # Also set the Bicep parameter name
            azd env set aiFoundryProjectName "$AI_PROJECT"
          fi
          
          # Try to refresh to get other variables
          azd env refresh || echo "Note: azd env refresh failed, continuing with manual configuration"
          
          # Ensure critical Foundry variables are set
          azd env set AZURE_FOUNDRY_MODEL_DEPLOYMENT_NAME "gpt-4.1-mini"
          azd env set AZURE_FOUNDRY_MODEL_NAME "gpt-4.1-mini"
          azd env set AZURE_FOUNDRY_MODEL_API_MODE "chat_completions"
          azd env set AZURE_FOUNDRY_AUTH_MODE "entra_id"
          
          # Verify BASE_URL is set
          BASE_URL=$(azd env get-value AZURE_FOUNDRY_BASE_URL || echo "")
          if [ -z "$BASE_URL" ]; then
            echo "ERROR: AZURE_FOUNDRY_BASE_URL is not set"
            echo "Available environment variables:"
            azd env get-values
            exit 1
          fi
          
          # Show environment for debugging
          echo "✓ Environment variables configured:"
          azd env get-values | grep -E "AZURE_FOUNDRY|AZURE_AI|AZURE_RESOURCE_GROUP|FOUNDRY|aiFoundry" || echo "No Foundry variables found"
          
          echo ""
          echo "=== All azd environment variables ==="
          azd env get-values
      
      - name: Deploy to Azure
        run: |
          echo "Starting deployment..."
          
          # Ensure project name is set before deployment
          PROJECT_NAME=$(azd env get-value AZURE_AI_PROJECT_NAME || echo "hermes-build")
          echo "Project Name for deployment: $PROJECT_NAME"
          
          # Set it again just before deploy
          azd env set AZURE_AI_PROJECT_NAME "$PROJECT_NAME"
          
          # Also try setting it as a shell environment variable
          export AZURE_AI_PROJECT_NAME="$PROJECT_NAME"
          export FOUNDRY_PROJECT_NAME="$PROJECT_NAME"
          
          azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ secrets.AZURE_ENV_NAME }}
          AZURE_AI_PROJECT_NAME: hermes-build
          FOUNDRY_PROJECT_NAME: hermes-build
